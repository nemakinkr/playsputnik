name: Deploy production backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "scripts/backend-worker-test.mjs"
      - "scripts/rawg-enrichment-test.mjs"
      - "scripts/backend-live-monitor.mjs"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Test Worker contract
        run: |
          node scripts/backend-worker-test.mjs
          node scripts/rawg-enrichment-test.mjs

      - name: Check Cloudflare deploy credentials
        id: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Cloudflare deploy credentials are not configured; contract tests passed, deploy skipped."
          fi

      - name: Deploy Cloudflare Worker
        if: steps.cloudflare.outputs.configured == 'true'
        run: npx --yes wrangler@4 deploy --config backend/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      - name: Verify live backend
        if: steps.cloudflare.outputs.configured == 'true'
        run: node scripts/backend-live-monitor.mjs
        env:
          PLAYSPUTNIK_API_ORIGIN: ${{ vars.PLAYSPUTNIK_API_ORIGIN }}
