name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Configure public API origin
        run: node scripts/configure-runtime.mjs
        env:
          PLAYSPUTNIK_API_ORIGIN: ${{ vars.PLAYSPUTNIK_API_ORIGIN }}
          PLAYSPUTNIK_SUPABASE_URL: ${{ vars.PLAYSPUTNIK_SUPABASE_URL }}
          PLAYSPUTNIK_SUPABASE_ANON_KEY: ${{ vars.PLAYSPUTNIK_SUPABASE_ANON_KEY }}
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v5
      - name: Production smoke
        run: node scripts/production-smoke-test.mjs "${{ steps.deployment.outputs.page_url }}"
      - name: Production browser smoke
        run: node scripts/production-browser-smoke-test.mjs "${{ steps.deployment.outputs.page_url }}"
