name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate data
        run: node scripts/validate-data.mjs
      - name: QA harness (module logic, no browser)
        run: node scripts/qa-harness.mjs
