name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate data
        run: |
          node scripts/validate-data.mjs
          node scripts/editorial-data-check.mjs
          node scripts/atom-quality-audit.mjs
      - name: Validate i18n catalogs and usage
        run: |
          node scripts/i18n-check.mjs
          node scripts/i18n-startup-test.mjs
          node scripts/companion-intelligence-test.mjs
          node scripts/onboarding-diagnostic-test.mjs
          node scripts/ranking-dogfood-audit.mjs
          node scripts/founder-recommendation-evaluation.mjs
          node scripts/synthetic-profile-evaluation.mjs
          node scripts/decision-workflow-test.mjs
          node scripts/detail-view-test.mjs
          node scripts/state-migrations-test.mjs
          node scripts/import-resolution-test.mjs
          node scripts/release-upgrade-test.mjs
          node scripts/state-class-check.mjs
          node scripts/architecture-map.mjs --check
          node scripts/ai-narrative-test.mjs
          node scripts/backend-worker-test.mjs
          node scripts/rawg-enrichment-test.mjs
      - name: QA harness (module logic, no browser)
        run: node scripts/qa-harness.mjs
      # Browser gates (contrast + mobile 375px + a11y + stale-hidden) — catch regressions that
      # are invisible in normal dev even if an agent commits without running
      # check.sh locally. All four run on ONE headless Chrome (system Chrome,
      # preinstalled on ubuntu runners; CDP, no browser download needed).
      - name: Serve static site
        run: |
          python3 scripts/serve-static.py 7432 >/dev/null 2>&1 &
          sleep 1
      - name: Browser gates (contrast + mobile + a11y + stale-hidden)
        run: node scripts/browser-gates.mjs http://127.0.0.1:7432/
      # Browser smoke suite — the 8 Playwright smokes previously ran only in
      # check.sh locally, so a smoke regression could slip past CI (search-memory
      # already rotted that way once). Install Playwright's Chromium and run the
      # self-contained suite (boots its own preview :4190 + fixture backend :4191).
      - name: Install Playwright Chromium
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright >/dev/null 2>&1
          npx playwright install chromium
      - name: Browser smoke suite (8 Playwright smokes, fixture backend)
        run: |
          export PLAYSPUTNIK_CHROME="$(node -e "console.log(require('playwright').chromium.executablePath())")"
          node scripts/smoke-suite.mjs
