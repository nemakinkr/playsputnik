name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate data
        run: node scripts/validate-data.mjs
      - name: QA harness (module logic, no browser)
        run: node scripts/qa-harness.mjs
      # Dark-mode contrast backstop — catches a light-bg-in-dark regression even
      # if an agent commits without running check.sh locally. Uses system Chrome
      # (preinstalled on ubuntu runners) over CDP, no browser download needed.
      - name: Serve static site
        run: |
          python3 -m http.server 7432 >/dev/null 2>&1 &
          sleep 1
      - name: Dark-mode contrast gate
        run: node scripts/contrast-check.mjs http://127.0.0.1:7432/
      - name: Mobile layout gate (375px)
        run: node scripts/mobile-check.mjs http://127.0.0.1:7432/
