<html lang="en">
  <head>

    <title>PlaySputnik App JS Health</title>
  </head>
  <body>
    <main>
      <h1>App JS health check</h1>
      <output id="app-js-output">loading</output>
    </main>
    <script>
      window.PLAYSPUTNIK_SKIP_INIT = true;
    </script>
    <script src="../app.js?v=20260603-onboarding-health"></script>

      document.querySelector("#app-js-output").textContent =

    </script>
  </body>
</html>
